<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TagVault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --white:#fff;--bg:#f4f0f8;--sky:#e0f0ff;--sky2:#c4e0ff;
  --pink:#fde8f3;--pink2:#f8cce4;--border:#e4ddf0;
  --text:#48405e;--muted:#9890b4;--dim:#ccc6dc;
  --cs:#5a96c4;--cp:#c05888;--cm:#52a880;
  --cu:#8458b8;--ce:#c07838;--ct:#42a0ae;
  --sw:240px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* LOGIN */
.loginscreen{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--sky),var(--pink));}
.loginbox{background:var(--white);border-radius:20px;padding:40px 36px;width:340px;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;box-shadow:0 20px 60px rgba(160,140,200,.25);}
.loginlogo{font-size:42px;}.logintitle{font-size:20px;font-weight:700;}.loginsub{font-size:13px;color:var(--muted);line-height:1.6;}
.googlebtn{display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-family:inherit;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;width:100%;justify-content:center;transition:all .15s;}
.googlebtn:hover{border-color:var(--sky2);background:var(--sky);}
.googlebtn img{width:20px;height:20px;}

/* APP */
.app{display:none;height:100vh;grid-template-columns:var(--sw) 1fr;grid-template-rows:54px 1fr;}
.app.on{display:grid;}

/* HEADER */
header{grid-column:1/-1;display:flex;align-items:center;padding:0 14px;gap:6px;background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;flex-wrap:nowrap;}
.logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-shrink:0;white-space:nowrap;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--sky2),var(--pink2));}
.hdiv{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.htabs{display:flex;gap:2px;flex-shrink:0;}
.htab{background:none;border:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .14s;white-space:nowrap;}
.htab:hover{background:var(--bg);color:var(--text);}
.htab.on{background:linear-gradient(120deg,rgba(196,224,255,.35),rgba(248,204,228,.35));color:var(--text);}
.hright{margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.vbadge{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 7px;white-space:nowrap;}
.hbtn{display:flex;align-items:center;gap:3px;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-family:inherit;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .14s;white-space:nowrap;}
.hbtn:hover{border-color:var(--sky2);color:var(--cs);}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-top{padding:12px 12px 8px;flex-shrink:0;}
.sb-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:0 4px;margin-bottom:6px;}
.sbox{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:7px;padding:6px 9px;border:1px solid transparent;transition:border-color .14s;}
.sbox:focus-within{border-color:var(--sky2);}
.sbox svg{color:var(--dim);flex-shrink:0;}
.sbox input{background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--text);width:100%;}
.sbox input::placeholder{color:var(--dim);}
.catlist{flex:1;overflow-y:auto;padding:4px 8px 10px;}
.catlist::-webkit-scrollbar{width:3px;}
.catlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.catbtn{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;text-align:left;width:100%;transition:background .12s;position:relative;}
.catbtn:hover{background:var(--bg);}
.catbtn.on{background:linear-gradient(100deg,rgba(196,224,255,.3),rgba(248,204,228,.25));}
.catbtn.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;border-radius:3px;background:linear-gradient(180deg,var(--sky2),var(--pink2));}
.cat-drag{cursor:grab;color:var(--dim);font-size:14px;flex-shrink:0;padding:0 2px;}
.catav{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--sky),var(--pink));display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;border:1.5px solid var(--border);}
.catav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.catinfo{flex:1;min-width:0;}
.catname{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.catbtn.on .catname{color:var(--cs);}
.catsub{font-size:10px;color:var(--dim);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.sbfoot{padding:8px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--dim);font-family:'DM Mono',monospace;flex-shrink:0;}

/* MAIN */
.main{overflow-y:auto;background:var(--bg);}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}
.overview{padding:20px;}
.ovgrid{display:block;}

/* GROUP */
.group-section{margin-bottom:28px;}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.group-title{font-size:14px;font-weight:700;color:var(--text);cursor:pointer;outline:none;background:none;border:none;font-family:inherit;padding:0;}
.group-title:hover{color:var(--cs);}
.group-title-input{font-size:14px;font-weight:700;color:var(--text);background:none;border:none;border-bottom:2px solid var(--sky2);outline:none;font-family:inherit;width:160px;padding:0;}
.group-actions{margin-left:auto;display:flex;gap:2px;}
.group-act-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--dim);padding:3px 6px;border-radius:6px;transition:all .12s;}
.group-act-btn:hover{background:var(--bg);color:var(--text);}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:4px;}
.ungrouped-section{margin-bottom:28px;}
.add-group-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:1.5px dashed var(--dim);border-radius:20px;background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;margin-top:4px;transition:all .15s;}
.add-group-btn:hover{border-color:var(--sky2);color:var(--cs);background:rgba(196,224,255,.1);}

/* ── CARD STYLES ── */
/* 기본: 오버레이 스타일 */
.ovcard{border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;position:relative;aspect-ratio:3/4;background:linear-gradient(135deg,var(--sky),var(--pink));}
.ovcard:hover{box-shadow:0 8px 28px rgba(0,0,0,.2);transform:translateY(-3px);}
.ovthumb{position:absolute;inset:0;overflow:hidden;}
.ovthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.ovthumb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;}
.ovstrip{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;}
.ovstrip img{width:100%;height:100%;object-fit:cover;}
.ovinfo{position:absolute;bottom:0;left:0;right:0;padding:28px 12px 12px;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 100%);}
.ovname{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.4);}
.ovsub{font-size:10px;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'Noto Sans KR',sans-serif;}

/* 비율 */
body.card-vertical .ovcard{aspect-ratio:3/4 !important;}
body.card-horizontal .ovcard{aspect-ratio:16/9 !important;}
body.card-horizontal .group-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}

/* 틀 스타일 */
body.frame-round .ovcard{border-radius:24px;}
body.frame-square .ovcard{border-radius:4px;}
body.frame-shadow .ovcard{box-shadow:0 8px 24px rgba(0,0,0,.25);}
body.frame-border .ovcard{outline:3px solid var(--white);box-shadow:0 0 0 5px rgba(0,0,0,.15);}

/* 폴라로이드 - 3번 이미지처럼 깔끔한 흰 테두리 */
body.frame-polaroid .ovcard{
  background:var(--white);
  border:1px solid #ddd;
  box-shadow:2px 4px 16px rgba(0,0,0,.15);
  border-radius:3px;
  overflow:hidden;
}
body.frame-polaroid.card-vertical .ovcard{aspect-ratio:3/4 !important;}
body.frame-polaroid.card-horizontal .ovcard{aspect-ratio:16/9 !important;}
body.frame-polaroid .ovthumb{
  position:absolute;
  top:8px;left:8px;right:8px;
  bottom:44px;
  border-radius:1px;
  overflow:hidden;
}
body.frame-polaroid .ovinfo{
  position:absolute;
  bottom:0;left:0;right:0;
  height:44px;
  padding:8px 12px;
  background:var(--white);
}
body.frame-polaroid .ovname{color:var(--text);font-size:12px;text-shadow:none;}
body.frame-polaroid .ovsub{color:var(--muted);}

/* MOBILE */
@media(max-width:768px){
  :root{--sw:0px;}
  .app{grid-template-columns:1fr !important;grid-template-rows:54px 1fr !important;}
  header{padding:0 10px;gap:4px;}
  .logo{font-size:12px;}.hdiv{display:none;}.htabs{display:none;}.vbadge{display:none;}
  .hbtn{padding:4px 6px;font-size:10px;}
  .sidebar{position:fixed;bottom:0;left:0;right:0;height:60vh;border-right:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;box-shadow:0 -8px 32px rgba(140,120,180,.15);z-index:80;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1);}
  .sidebar.open{transform:translateY(0);}
  .sb-handle{width:36px;height:4px;border-radius:4px;background:var(--border);margin:10px auto 0;}
  .main{grid-column:1;grid-row:2;padding-bottom:70px;}
  .mobile-tabbar{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;z-index:70;}
  .mtab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;background:none;border:none;font-family:inherit;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;flex:1;}
  .mtab.on{color:var(--cs);}
  .mtab-icon{font-size:18px;}
  .sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:79;display:none;}
  .sb-overlay.on{display:block;}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--cs);cursor:pointer;padding:0 0 16px;}
  .group-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr)) !important;gap:8px !important;}
}
@media(min-width:769px){.mobile-tabbar{display:none;}.sb-handle{display:none;}.sb-overlay{display:none !important;}.back-btn{display:none;}}

/* DETAIL */
.detail{padding:22px 26px 40px;display:none;}
.hero{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,transparent 55%,rgba(196,224,255,.18) 75%,rgba(248,204,228,.15) 100%);pointer-events:none;}
.heroav{width:72px;height:72px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--sky),var(--pink));display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;border:2.5px solid var(--border);}
.heroav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.herobody{flex:1;min-width:0;}
.heroname{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px;}
.herotag{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--cs);margin-bottom:7px;}
.herobadges{display:flex;gap:5px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.memobox{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.herobtns{display:flex;gap:5px;flex-shrink:0;}
.ibtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--white);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .14s;}
.ibtn:hover{background:var(--sky);border-color:var(--sky2);}

/* GALLERY */
.cgal-section{margin-bottom:16px;}
.cgal-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px;padding-left:2px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.gimgwrap{aspect-ratio:1;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,var(--sky),var(--pink));position:relative;cursor:pointer;}
.gimgwrap img{width:100%;height:100%;object-fit:cover;transition:transform .2s;}
.gimgwrap:hover img{transform:scale(1.04);}
.gimgwrap.dragging{opacity:.3;}
.gimgwrap.drag-over{outline:2px solid var(--sky2);}
.gimgdel{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:11px;cursor:pointer;color:var(--cp);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.gimgpos-btn{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:12px;cursor:pointer;color:var(--cs);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.gimgwrap:hover .gimgdel,.gimgwrap:hover .gimgpos-btn{opacity:1;}
.gadd{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:none;color:var(--dim);font-size:10px;font-family:inherit;transition:all .15s;}
.gadd:hover{border-color:var(--sky2);color:var(--cs);background:rgba(196,224,255,.1);}

/* ENTRIES */
.entries{display:flex;flex-direction:column;gap:12px;}
.entry{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .18s,transform .18s;position:relative;}
.entry:hover{box-shadow:0 5px 20px rgba(160,180,220,.14);transform:translateY(-1px);}
.entry.sel{border-color:var(--sky2);box-shadow:0 0 0 2px rgba(196,224,255,.4);}
.entry.dragging{opacity:.3;}
.entry.drag-over{outline:2px solid var(--sky2);}
.entry-drag-handle{position:absolute;top:12px;left:10px;cursor:grab;color:var(--dim);font-size:14px;z-index:2;user-select:none;}
.echk-wrap{position:absolute;top:10px;right:10px;z-index:2;}
.echk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--dim);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;user-select:none;transition:all .14s;}
.echk:hover{border-color:var(--sky2);}
.entry.sel .echk{background:linear-gradient(135deg,var(--sky2),var(--pink2));border-color:transparent;color:#607098;}
.ebody{padding:10px 14px 12px 32px;}
.erow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;}
.etitle{font-size:11px;font-weight:700;color:var(--muted);}
.ebtns{display:flex;gap:4px;}
.copybtn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-family:inherit;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .14s;}
.copybtn:hover{border-color:var(--sky2);color:var(--cs);}
.delbtn{padding:3px 7px;border-radius:20px;border:1px solid transparent;background:none;font-size:11px;color:var(--dim);cursor:pointer;transition:all .14s;}
.delbtn:hover{color:var(--cp);background:rgba(248,204,228,.25);}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.chip{padding:3px 9px;border-radius:20px;font-size:10.5px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid;transition:all .12s;user-select:none;}
.chip:hover{transform:translateY(-1px);}
.k0{background:rgba(90,150,196,.1);color:var(--cs);border-color:rgba(90,150,196,.22);}
.k1{background:rgba(192,88,136,.1);color:var(--cp);border-color:rgba(192,88,136,.22);}
.k2{background:rgba(82,168,128,.1);color:var(--cm);border-color:rgba(82,168,128,.22);}
.k3{background:rgba(132,88,184,.1);color:var(--cu);border-color:rgba(132,88,184,.22);}
.k4{background:rgba(192,120,56,.1);color:var(--ce);border-color:rgba(192,120,56,.22);}
.k5{background:rgba(66,160,174,.1);color:var(--ct);border-color:rgba(66,160,174,.22);}
.addebtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:1.5px dashed var(--dim);border-radius:12px;background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;margin-top:4px;transition:all .15s;}
.addebtn:hover{border-color:var(--sky2);color:var(--cs);background:rgba(196,224,255,.1);}

/* SUMMARY */
.sumbox{margin-top:16px;background:var(--white);border:1.5px solid var(--sky2);border-radius:14px;overflow:hidden;}
.sumhead{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(90deg,rgba(196,224,255,.25),rgba(248,204,228,.2));border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.sumtitle{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;}
.sumcnt{font-family:'DM Mono',monospace;font-size:10px;color:var(--cs);background:rgba(196,224,255,.3);border:1px solid rgba(196,224,255,.6);border-radius:20px;padding:1px 7px;font-weight:700;}
.scpbtn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--sky2),var(--pink2));font-family:inherit;font-size:11px;font-weight:700;color:#607098;cursor:pointer;}
.scpbtn:hover{filter:brightness(.96);}
.sumchips{padding:12px 16px;display:flex;flex-wrap:wrap;gap:5px;}
.schap{padding:3px 10px;border-radius:20px;font-size:10.5px;font-family:'DM Mono',monospace;cursor:pointer;background:rgba(196,224,255,.18);color:var(--cs);border:1px solid rgba(196,224,255,.45);transition:all .12s;user-select:none;}
.schap:hover{background:rgba(196,224,255,.38);transform:translateY(-1px);}

/* PAIR */
.pairsec{margin-top:16px;background:var(--white);border:1.5px solid var(--pink2);border-radius:14px;overflow:hidden;}
.pairhead{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(90deg,rgba(248,204,228,.25),rgba(196,224,255,.2));border-bottom:1px solid var(--border);}
.pairtitle{font-size:12px;font-weight:700;}
.pairempty{padding:16px;font-size:12px;color:var(--dim);text-align:center;}
.paircard{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);}
.paircard:last-child{border-bottom:none;}
.pair-drag{cursor:grab;color:var(--dim);font-size:13px;flex-shrink:0;}
.pairav{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pink),var(--sky));display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;border:1.5px solid var(--pink2);}
.pairav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pairbody{flex:1;min-width:0;}
.pairname{font-size:12px;font-weight:700;margin-bottom:5px;}
.pairtags{display:flex;flex-wrap:wrap;gap:4px;}
.pairacts{display:flex;gap:4px;flex-shrink:0;}

/* MERGE BAR */
.mbar{position:fixed;bottom:24px;left:calc(var(--sw) + 24px);right:24px;background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 32px rgba(140,120,180,.18);padding:14px 18px;display:flex;align-items:flex-start;gap:14px;z-index:50;transform:translateY(20px);opacity:0;pointer-events:none;transition:all .24s cubic-bezier(.34,1.56,.64,1);}
.mbar.on{opacity:1;transform:translateY(0);pointer-events:all;}
.mbar-left{flex:1;min-width:0;}
.mbar-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mbar-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.mcnt{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;background:linear-gradient(120deg,rgba(196,224,255,.5),rgba(248,204,228,.5));border:1px solid var(--border);color:var(--cs);border-radius:20px;padding:1px 7px;}
.mclr{margin-left:auto;background:none;border:none;font-size:11px;color:var(--dim);cursor:pointer;font-family:inherit;}
.mpills{display:flex;flex-wrap:wrap;gap:5px;}
.mpill{display:flex;align-items:center;gap:5px;padding:3px 9px 3px 6px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg);}
.mpilldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mpillx{background:none;border:none;cursor:pointer;color:var(--dim);font-size:12px;line-height:1;padding:0 0 0 2px;}
.mbar-right{display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-self:center;}
.mcopybtn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--sky2),var(--pink2));font-family:inherit;font-size:12px;font-weight:700;color:#607098;cursor:pointer;white-space:nowrap;}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(40,30,60,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.lbox.on{opacity:1;pointer-events:all;}
.lbox img{max-width:90vw;max-height:90vh;border-radius:12px;}
.lboxclose{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:24px;cursor:pointer;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:linear-gradient(120deg,var(--sky2),var(--pink2));color:#58709a;font-size:12px;font-weight:700;padding:8px 18px;border-radius:30px;opacity:0;pointer-events:none;transition:all .2s;z-index:999;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(210,200,230,.35);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:var(--white);border:1px solid var(--border);border-radius:16px;width:480px;max-width:92vw;max-height:88vh;overflow-y:auto;transform:scale(.95) translateY(10px);transition:transform .2s;box-shadow:0 14px 44px rgba(150,130,190,.18);}
.overlay.on .modal{transform:scale(1) translateY(0);}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:17px 20px 15px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(196,224,255,.25),rgba(248,204,228,.2));border-radius:16px 16px 0 0;}
.mtitle{font-size:14px;font-weight:700;color:var(--cs);}
.mclose{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1;}
.mclose:hover{color:var(--cp);}
.mbody{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.finput,.ftarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:9px 11px;outline:none;width:100%;transition:border-color .14s,background .14s;}
.finput:focus,.ftarea:focus{border-color:var(--sky2);background:var(--white);}
.finput::placeholder,.ftarea::placeholder{color:var(--dim);}
.ftarea{resize:vertical;min-height:90px;font-size:12px;}
.mfoot{display:flex;gap:7px;justify-content:flex-end;padding:13px 20px;border-top:1px solid var(--border);}
.cancelbtn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 15px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.cancelbtn:hover{border-color:var(--sky2);color:var(--cs);}
.savebtn{background:linear-gradient(135deg,var(--sky2),var(--pink2));border:none;border-radius:8px;padding:7px 18px;font-family:inherit;font-size:12px;font-weight:700;color:#607098;cursor:pointer;}
.savebtn:hover{filter:brightness(.96);}
.pavarea{display:flex;align-items:center;gap:14px;}
.pavprev{width:60px;height:60px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--sky),var(--pink));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;cursor:pointer;}
.pavprev:hover{border-color:var(--sky2);}
.pavprev img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pavhint{font-size:11px;color:var(--muted);line-height:1.6;}
.pavhint strong{color:var(--cs);cursor:pointer;}

/* SHARE */
.sharepop{position:fixed;inset:0;z-index:9998;background:rgba(210,200,230,.45);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.sharepop.on{opacity:1;pointer-events:all;}
.sharebox{background:var(--white);border-radius:18px;padding:28px 26px;width:480px;max-width:92vw;display:flex;flex-direction:column;gap:16px;border:1px solid var(--border);box-shadow:0 16px 48px rgba(150,130,190,.2);}
.sharetitle{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.shareclose{margin-left:auto;background:none;border:none;font-size:20px;color:var(--dim);cursor:pointer;}
.sharerow{display:flex;flex-direction:column;gap:6px;}
.sharelabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.sharewrap{display:flex;gap:8px;}
.sharelink{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);outline:none;}
.sharecpbtn{padding:9px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--sky2),var(--pink2));font-family:inherit;font-size:12px;font-weight:700;color:#607098;cursor:pointer;white-space:nowrap;}
.sharecpbtn.done{background:linear-gradient(135deg,#a8e6c8,#c8e6a8);color:#407050;}

/* TAG EDIT */
.tag-edit-list{display:flex;flex-direction:column;gap:6px;max-height:40vh;overflow-y:auto;}
.tag-edit-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}
.tag-edit-input{flex:1;background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);}
.tag-del-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.tag-del-btn:hover{color:var(--cp);}

/* THEME + CARDSTYLE + IMGPOS POPUPS */
.popup{position:fixed;inset:0;z-index:9998;background:rgba(210,200,230,.35);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.popup.on{opacity:1;pointer-events:all;}
.popbox{background:var(--white);border-radius:18px;padding:24px;width:440px;max-width:92vw;display:flex;flex-direction:column;gap:14px;border:1px solid var(--border);box-shadow:0 16px 48px rgba(150,130,190,.2);}
.pop-title{font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.pop-close{background:none;border:none;font-size:18px;color:var(--dim);cursor:pointer;}
.pop-section-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}
.pop-row{display:flex;gap:8px;flex-wrap:wrap;}
.theme-presets{display:flex;gap:8px;flex-wrap:wrap;}
.theme-preset{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.theme-preset:hover{transform:scale(1.15);}
.theme-preset.on{border-color:var(--text);}
.theme-custom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.theme-field{display:flex;flex-direction:column;gap:5px;}
.theme-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.theme-field-row{display:flex;align-items:center;gap:8px;}
.theme-swatch{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.theme-hex{font-family:'DM Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;width:90px;outline:none;color:var(--text);}
.theme-hex:focus{border-color:var(--sky2);}
.style-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .14s;}
.style-btn:hover{border-color:var(--sky2);color:var(--cs);}
.style-btn.on{border-color:var(--sky2);color:var(--cs);background:rgba(196,224,255,.15);}
.imgpos-preview{width:100%;height:200px;border-radius:10px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--sky),var(--pink));cursor:grab;user-select:none;}
.imgpos-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.size-row{display:flex;align-items:center;gap:10px;}
.size-row label{font-size:11px;color:var(--muted);font-weight:600;min-width:40px;}
.size-row input[type=range]{flex:1;}
.size-row span{font-size:11px;color:var(--text);min-width:32px;text-align:right;}

/* VIEWER */
body.viewer .herobtns,
body.viewer .addebtn,
body.viewer .delbtn,
body.viewer .echk-wrap,
body.viewer .mbar,
body.viewer .gadd,
body.viewer .gimgdel,
body.viewer .gimgpos-btn,
body.viewer .pairsec,
body.viewer .pairacts,
body.viewer .ebtns .copybtn:first-child,
body.viewer .add-group-btn,
body.viewer .group-actions,
body.viewer .entry-drag-handle,
body.viewer .pair-drag,
body.viewer .cat-drag,
body.viewer [data-tab="style"],
body.viewer .hbtn:not(.vonly){display:none !important;}
body.viewer.showpair .pairsec{display:block !important;}
body.viewer.showpair .pairacts{display:none !important;}
body.viewer.hide-style [data-tab="style"]{display:none !important;}

.card-imgpos-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.85);border:none;font-size:14px;cursor:pointer;color:var(--cs);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:3;}
.ovcard:hover .card-imgpos-btn{opacity:1;}
</style>
</head>
<body>

<div class="loginscreen" id="loginscreen">
  <div class="loginbox">
    <div class="loginlogo">🏷️</div>
    <div class="logintitle">TagVault</div>
    <div class="loginsub">구글 계정으로 로그인하면<br>나만의 태그 저장소를 만들 수 있어요</div>
    <button class="googlebtn" onclick="signIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      Google로 로그인
    </button>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div class="logo">🏷️ TagVault <span class="logo-dot"></span></div>
    <div class="hdiv"></div>
    <div class="htabs">
      <button class="htab on" data-tab="artist" onclick="switchTab('artist')" ondblclick="editTabName('artist',this)"><span id="tlab-artist">캐릭터명단</span></button>
      <button class="htab" data-tab="style" onclick="switchTab('style')" ondblclick="editTabName('style',this)"><span id="tlab-style">베이스프롬</span></button>
    </div>
    <div class="hright">
      <span class="vbadge">v55</span>
      <button class="hbtn vonly" onclick="openTheme()">🎨</button>
      <button class="hbtn vonly" onclick="openCardStyle()">⊞</button>
      <button class="hbtn" id="stylesharebtn" onclick="toggleStyleShare()" style="display:none"></button>
      <button class="hbtn" id="sharebtn" onclick="openShareSettings()" style="display:none">공유</button>
      <button class="hbtn" id="groupbtn" onclick="openGroupModal()" style="display:none">그룹</button>
      <button class="hbtn" id="addbtn" onclick="openAddCat()" style="display:none">+ 추가</button>
      <button class="hbtn" id="signoutbtn" onclick="signOut()" style="display:none">로그아웃</button>
    </div>
  </header>

  <div class="sb-overlay" id="sboverlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-handle"></div>

      <div class="sb-label" id="sblabel">캐릭터명단</div>
      <div class="sbox">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="검색..." id="searchInput" oninput="renderSidebar()">
      </div>
    </div>
    <div class="catlist" id="catlist"></div>
    <div class="sbfoot" id="sbfoot"></div>
  </div>

  <div class="main" id="mainarea">
    <div class="overview" id="overview"><div class="ovgrid" id="ovgrid"></div></div>
    <div class="detail" id="detail"></div>
  </div>

  <div class="mobile-tabbar">
    <button class="mtab on" id="mtab-home" onclick="mobileTab('home')"><span class="mtab-icon">🏠</span>홈</button>
    <button class="mtab" id="mtab-list" onclick="mobileTab('list')"><span class="mtab-icon">📋</span>목록</button>
    <button class="mtab" id="mtab-artist" onclick="switchTab('artist');mobileTab('home')"><span class="mtab-icon">🎨</span>캐릭터</button>

  </div>
</div>

<!-- MERGE BAR -->
<div class="mbar" id="mbar">
  <div class="mbar-left">
    <div class="mbar-hd"><span class="mbar-title">✨ 통합 복사</span><span class="mcnt" id="mcnt">0개</span><button class="mclr" onclick="clearSel()">해제</button></div>
    <div class="mpills" id="mpills"></div>
  </div>
  <div class="mbar-right"><button class="mcopybtn" onclick="mergeCopy()">합쳐서 복사</button></div>
</div>

<div class="lbox" id="lbox" onclick="closeLbox()"><button class="lboxclose">×</button><img id="lboximg" src="" alt=""></div>

<!-- SHARE -->
<div class="sharepop" id="sharepop" onmousedown="if(event.target===this)closeSharePop()">
  <div class="sharebox">
    <div class="sharetitle">🔗 공유 링크 <button class="shareclose" onclick="closeSharePop()">×</button></div>
    <div class="sharerow"><div class="sharelabel">📋 Pair 숨김</div><div class="sharewrap"><input class="sharelink" id="sharelink1" readonly><button class="sharecpbtn" id="sharecpbtn1" onclick="cpShareLink(1)">복사</button></div></div>
    <div class="sharerow"><div class="sharelabel">💘 Pair 포함</div><div class="sharewrap"><input class="sharelink" id="sharelink2" readonly><button class="sharecpbtn" id="sharecpbtn2" onclick="cpShareLink(2)">복사</button></div></div>
    <div style="font-size:11px;color:var(--dim)">테마/카드스타일은 Firebase로 자동 반영돼요!</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CAT MODAL -->
<div class="overlay" id="catmodal" onmousedown="if(event.target===this)closeCatModal()">
  <div class="modal" onmousedown="event.stopPropagation()">
    <div class="mhead"><div class="mtitle" id="catmodaltitle">카테고리 추가</div><button class="mclose" onclick="closeCatModal()">×</button></div>
    <div class="mbody">
      <div class="field"><label>프로필 이미지</label>
        <div class="pavarea"><div class="pavprev" id="pavprev" onclick="document.getElementById('pavinput').click()">🎨</div>
        <div class="pavhint">클릭 또는 <strong onclick="document.getElementById('pavinput').click()">파일 선택</strong></div></div>
        <input type="file" id="pavinput" accept="image/*" style="display:none" onchange="onProfileFile(event)">
      </div>
      <div class="field"><label>이름</label><input class="finput" id="catname" placeholder="예: 호무라"></div>
      <div class="field"><label>태그 식별자 (옵션)</label><input class="finput" id="cattag" placeholder="예: artist:호무라"></div>
      <div class="field"><label>이모지</label><input class="finput" id="catemoji" placeholder="🎨" maxlength="4"></div>
      <div class="field"><label>메모</label><textarea class="ftarea" id="catmemo" rows="2" placeholder="자유롭게..."></textarea></div>
    </div>

  </div>

<!-- ENTRY MODAL -->
<div class="overlay" id="entrymodal" onmousedown="if(event.target===this)closeEntryModal()">

<!-- PAIR MODAL -->
<div class="overlay" id="pairmodal" onmousedown="if(event.target===this)closePairModal()">

      <div class="field"><label>프로필 이미지</label>

    <div class="mbody"><div id="group-manage-list" style="display:flex;flex-direction:column;gap:8px"></div></div>

  </div>
</div>

<!-- THEME POPUP -->
<div class="popup" id="themepopup" onmousedown="if(event.target===this)closeTheme()">
  <div class="popbox" onmousedown="event.stopPropagation()">
    <div class="pop-title">🎨 테마 <button class="pop-close" onclick="closeTheme()">×</button></div>

<script>
const FB={apiKey:"AIzaSyA5vlK5hwpfq0SCyn7HBezj0DpqmAtC65Y",authDomain:"character-prompt.firebaseapp.com",databaseURL:"https://character-prompt-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"character-prompt",storageBucket:"character-prompt.firebasestorage.app",messagingSenderId:"1078856893225",appId:"1:1078856893225:web:5c389bdd7ff151d7fead38"};
const params=new URLSearchParams(location.search);

let fbDB=null,fbAuth=null,currentUser=null;

// ── FIREBASE ──
function loadFirebase(){
  const load=(src,cb)=>{const s=document.createElement('script');s.src=src;s.onload=cb;document.head.appendChild(s);};
  load('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',()=>
  load('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js',()=>
  load('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js',()=>{
    firebase.initializeApp(FB);
    fbDB=firebase.database();
    fbAuth=firebase.auth();
    fbAuth.onAuthStateChanged(onAuth);
  })));
}

function onAuth(user){
  if(IS_VIEW){
    document.getElementById('loginscreen').style.display='none';
    document.getElementById('app').classList.add('on');
    document.body.classList.add('viewer');
    if(PAIR_KEY) document.body.classList.add('showpair');
    if(params.get('style')==='0') document.body.classList.add('hide-style');
    listenData(VIEW_UID);
    return;
  }
  if(user){
    currentUser=user;
    document.getElementById('loginscreen').style.display='none';
    document.getElementById('app').classList.add('on');
    ['sharebtn','groupbtn','addbtn','signoutbtn','stylesharebtn'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.style.display='flex';
    });
    loadStyleShare();
    listenData(user.uid);
  }else{
    document.getElementById('loginscreen').style.display='flex';
    document.getElementById('app').classList.remove('on');
  }
}

function signIn(){const p=new firebase.auth.GoogleAuthProvider();fbAuth.signInWithPopup(p).catch(e=>alert('로그인 실패: '+e.message));}
function signOut(){fbAuth.signOut();}

function listenData(uid){
  // 데이터 구독
  fbDB.ref('users/'+uid+'/data').on('value',snap=>{
    const v=snap.val()||{};
    cache={
      artist:v.artist?Object.values(v.artist):[],
      style:v.style?Object.values(v.style):[]
    };
    renderSidebar();renderOverview();
    if(selId)renderDetail(selId);
  });
  // settings 실시간 구독 (테마/카드스타일)
  fbDB.ref('users/'+uid+'/settings').on('value',snap=>{
    const s=snap.val();if(!s)return;
    if(s.theme) applyTheme(s.theme);
    if(s.cardStyle){localStorage.setItem('tv_cardstyle',s.cardStyle);loadCardStyle();}
    if(s.cardFrame){localStorage.setItem('tv_cardframe',s.cardFrame);loadCardStyle();}
  });
}

function saveDB(){
  if(IS_VIEW||!currentUser)return;
  fbDB.ref('users/'+currentUser.uid+'/data').update({
    artist:cache.artist.length?cache.artist:null,
    style:cache.style.length?cache.style:null
  }).catch(e=>alert('저장 실패: '+e.message));
}

function saveSettings(key,val){
  if(IS_VIEW||!currentUser)return;
  fbDB.ref('users/'+currentUser.uid+'/settings/'+key).set(val).catch(e=>console.error(key+' save:',e));
}

// ── IMAGE ──
function resizeImg(dataUrl,maxSize,q,cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize;}}else{if(h>maxSize){w=w*maxSize/h;h=maxSize;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));
  };img.src=dataUrl;
}
function onProfileFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>resizeImg(ev.target.result,300,.85,b64=>{pendingAv=b64;document.getElementById('pavprev').innerHTML=`<img src="${b64}" alt="">`;});r.readAsDataURL(f);}
function onPairProfileFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>resizeImg(ev.target.result,300,.85,b64=>{pendingPairAv=b64;document.getElementById('pairpavprev').innerHTML=`<img src="${b64}" alt="">`;});r.readAsDataURL(f);}
function onGalleryFile(e,catId){
  if(IS_VIEW)return;
  const files=Array.from(e.target.files);if(!files.length)return;
  const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;
  if(!cat.gallery)cat.gallery=[];
  let done=0;
  files.forEach(f=>{const r=new FileReader();r.onload=ev=>resizeImg(ev.target.result,800,.82,b64=>{cat.gallery.push(b64);if(++done===files.length){saveDB();renderDetail(selId);}});r.readAsDataURL(f);});
  e.target.value='';
}
function delGalImg(catId,idx){
  if(IS_VIEW)return;
  const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;
  cat.gallery.splice(idx,1);
  if(cat.galPos)delete cat.galPos[idx];
  saveDB();renderDetail(selId);
}

// ── IMAGE POSITION (갤러리 이미지) ──
function openCardImgPos(catId){
  if(IS_VIEW)return;
  const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;
  const g=cat.gallery||[];
  const src=cat.avatar||(g.length?g[0]:'');
  if(!src)return toast('이미지를 먼저 등록하세요');
  imgPosCatId=catId;imgPosGalIdx=-1;
  const saved=cat.imgPos||{x:50,y:50,size:100};
  imgPosX=saved.x;imgPosY=saved.y;imgPosSize=saved.size||100;
  document.getElementById('imgpos-img').src=src;
  document.getElementById('imgpos-size').value=imgPosSize;
  document.getElementById('imgpos-size-val').textContent=imgPosSize+'%';
  updateImgPos();
  document.getElementById('imgpospopup').classList.add('on');
  setTimeout(initImgPosDrag,50);
}

function openGalImgPos(catId,gi){
  if(IS_VIEW)return;
  const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;
  const src=cat.gallery&&cat.gallery[gi];if(!src)return;
  imgPosCatId=catId;imgPosGalIdx=gi;
  const saved=(cat.galPos&&cat.galPos[gi])||{x:50,y:50,size:100};
  imgPosX=saved.x;imgPosY=saved.y;imgPosSize=saved.size||100;
  document.getElementById('imgpos-img').src=src;
  document.getElementById('imgpos-size').value=imgPosSize;
  document.getElementById('imgpos-size-val').textContent=imgPosSize+'%';
  updateImgPos();
  document.getElementById('imgpospopup').classList.add('on');
}
function initImgPosDrag(){
  const el=document.getElementById('imgpos-preview');
  if(!el||el._dragInited)return;
  el._dragInited=true;
  let dragging=false,rafId=null;
  const handle=(cx,cy)=>{
    if(rafId)cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(()=>{movePos(cx,cy,el);rafId=null;});
  };
  el.style.cursor='grab';
  el.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();el.style.cursor='grabbing';handle(e.clientX,e.clientY);});
  el.addEventListener('mousemove',e=>{if(!dragging)return;handle(e.clientX,e.clientY);});
  el.addEventListener('mouseup',()=>{dragging=false;el.style.cursor='grab';});
  el.addEventListener('mouseleave',()=>{dragging=false;el.style.cursor='grab';});
  el.addEventListener('touchstart',e=>{dragging=true;e.preventDefault();handle(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchmove',e=>{if(!dragging)return;e.preventDefault();handle(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',()=>{dragging=false;});
}

function movePos(cx,cy,el){
  const rect=el.getBoundingClientRect();
  imgPosX=Math.max(0,Math.min(100,Math.round((cx-rect.left)/rect.width*100)));
  imgPosY=Math.max(0,Math.min(100,Math.round((cy-rect.top)/rect.height*100)));
  updateImgPos();
}
function updateImgPos(){
  imgPosSize=parseInt(document.getElementById('imgpos-size').value);
  document.getElementById('imgpos-size-val').textContent=imgPosSize+'%';
  const img=document.getElementById('imgpos-img');
  img.style.objectFit='cover';
  img.style.objectPosition=imgPosX+'% '+imgPosY+'%';
  // 크기 조절: width/height로 (transform 안 씀 → 깨짐 없음)
  if(imgPosSize>100){
    img.style.width=imgPosSize+'%';
    img.style.height=imgPosSize+'%';
    img.style.maxWidth='none';
  } else {
    img.style.width='100%';
    img.style.height='100%';
    img.style.maxWidth='';
  }
  img.style.transform='';
}
function saveImgPos(){
  const cat=(cache[tab]||[]).find(c=>c.id===imgPosCatId);if(!cat)return;
  if(imgPosGalIdx>=0){
    if(!cat.galPos)cat.galPos={};
    cat.galPos[imgPosGalIdx]={x:imgPosX,y:imgPosY,size:imgPosSize};
    saveDB();closeImgPos();renderDetail(imgPosCatId);
  } else {
    cat.imgPos={x:imgPosX,y:imgPosY,size:imgPosSize};
    saveDB();closeImgPos();renderOverview();
    if(selId===imgPosCatId)renderDetail(imgPosCatId);
  }
}
function closeImgPos(){document.getElementById('imgpospopup').classList.remove('on');}

// ── GALLERY DRAG ──
let galDragSrc=null,galDragCat=null;
function initGalleryDrag(catId){
  document.querySelectorAll('.gimgwrap[data-gi]').forEach(el=>{
    el.draggable=true;
    el.addEventListener('dragstart',e=>{galDragSrc=parseInt(el.dataset.gi);galDragCat=catId;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      const toIdx=parseInt(el.dataset.gi);
      if(galDragSrc===null||galDragSrc===toIdx)return;
      const cat=(cache[tab]||[]).find(c=>c.id===galDragCat);if(!cat||!cat.gallery)return;
      const[item]=cat.gallery.splice(galDragSrc,1);cat.gallery.splice(toIdx,0,item);
      galDragSrc=null;saveDB();renderDetail(selId);
    });
  });
}

// ── ENTRY DRAG ──
let entDragSrc=null,entDragCat=null;
function initEntryDrag(catId){
  document.querySelectorAll('.entry[data-ei]').forEach(el=>{
    el.draggable=true;
    el.addEventListener('dragstart',e=>{entDragSrc=parseInt(el.dataset.ei);entDragCat=catId;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      const toIdx=parseInt(el.dataset.ei);
      if(entDragSrc===null||entDragSrc===toIdx)return;
      const cat=(cache[tab]||[]).find(c=>c.id===entDragCat);if(!cat||!cat.entries)return;
      const[item]=cat.entries.splice(entDragSrc,1);cat.entries.splice(toIdx,0,item);
      entDragSrc=null;saveDB();renderDetail(selId);
    });
  });
}

// ── PAIR DRAG ──
let pairDragSrc=null,pairDragCat=null;
function initPairDrag(catId){
  document.querySelectorAll('.paircard[data-pi]').forEach(el=>{
    el.draggable=true;
    el.addEventListener('dragstart',e=>{pairDragSrc=parseInt(el.dataset.pi);pairDragCat=catId;el.style.opacity='.3';e.dataTransfer.effectAllowed='move';});

// ── CAT DRAG (순서) ──
let catDragSrc=null;
function initCatDrag(){
  document.querySelectorAll('.catbtn[data-ci]').forEach(el=>{
    el.draggable=true;
    el.addEventListener('dragstart',e=>{catDragSrc=parseInt(el.dataset.ci);el.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.style.opacity='';});
    el.addEventListener('dragover',e=>{e.preventDefault();el.style.background='rgba(196,224,255,.3)';});
    el.addEventListener('dragleave',()=>{el.style.background='';});
    el.addEventListener('drop',e=>{
      e.preventDefault();el.style.background='';
      const toIdx=parseInt(el.dataset.ci);
      if(catDragSrc===null||catDragSrc===toIdx)return;
      const cats=cache[tab];
      const[item]=cats.splice(catDragSrc,1);cats.splice(toIdx,0,item);
      catDragSrc=null;saveDB();renderSidebar();renderOverview();
    });
  });
}

// ── SIDEBAR ──
function renderSidebar(){
  const cats=cache[tab]||[];
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const filtered=cats.filter(c=>c.name.toLowerCase().includes(q)||(c.tag||'').toLowerCase().includes(q));
  document.getElementById('sblabel').textContent=tab==='artist'?(localStorage.getItem('tv_tabname_artist')||'캐릭터명단'):(localStorage.getItem('tv_tabname_style')||'베이스프롬');
  document.getElementById('sbfoot').textContent=`${filtered.length} / ${cats.length}개`;
  document.getElementById('catlist').innerHTML=filtered.map((cat,i)=>`
    <button class="catbtn ${cat.id===selId?'on':''}" data-ci="${i}" onclick="selectCat('${cat.id}')">
      ${IS_VIEW?'':'<span class="cat-drag">⠿</span>'}
      <div class="catav">${cat.avatar?`<img src="${cat.avatar}" alt="">`:(cat.emoji||'🏷️')}</div>
      <div class="catinfo"><div class="catname">${esc(cat.name)}</div>${cat.tag?`<div class="catsub">${esc(cat.tag)}</div>`:''}</div>
    </button>`).join('');
  if(!IS_VIEW) setTimeout(initCatDrag,50);
}

// ── OVERVIEW ──
function renderOverview(){
  const cats=cache[tab]||[];
  const grid=document.getElementById('ovgrid');
  if(!cats.length){grid.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--dim)"><div style="font-size:48px;opacity:.3">🏷️</div><p style="font-size:13px;color:var(--muted)">카테고리를 추가해보세요</p></div>`;return;}
  const groups=getGroups();
  let html='';
  groups.forEach((g,gi)=>{
    const grouped=cats.filter(c=>c.groupId===g.id);
    if(!grouped.length)return;
    html+=`<div class="group-section">
      <div class="group-header">
        <button class="group-title" ondblclick="editGroupTitle(${gi},this)">${esc(g.name)}</button>
        <div class="group-actions">
          <button class="group-act-btn" onclick="moveGroup(${gi},-1)" title="위로">↑</button>
          <button class="group-act-btn" onclick="moveGroup(${gi},1)" title="아래로">↓</button>
          <button class="group-act-btn" onclick="renameGroup(${gi})" title="이름 변경">✏️</button>
          <button class="group-act-btn" onclick="deleteGroup(${gi})" title="삭제">✕</button>
        </div>
      </div>
      <div class="group-grid">${grouped.map(cat=>ovCardHtml(cat)).join('')}</div>
    </div>`;
  });
  const gids=groups.map(g=>g.id);
  const ungrouped=cats.filter(c=>!c.groupId||!gids.includes(c.groupId));
  if(ungrouped.length) html+=`<div class="ungrouped-section"><div class="group-grid">${ungrouped.map(cat=>ovCardHtml(cat)).join('')}</div></div>`;
  if(!IS_VIEW) html+=`<button class="add-group-btn" onclick="addGroup()">+ 그룹 추가</button>`;
  grid.innerHTML=html;
}

function ovCardHtml(cat){
  const g=cat.gallery||[];
  const pos=cat.imgPos||{x:50,y:50,size:100};
  const sz=(pos.size||100)/100;
  const pw=sz>1?Math.round(sz*100)+'%':'100%';
  const ps=`object-fit:cover;object-position:${pos.x}% ${pos.y}%;width:${pw};height:${pw};max-width:none;`;
  let thumb='';
  if(cat.avatar) thumb=`<img src="${cat.avatar}" alt="" style="${ps}">`;
  else if(g.length>=4) thumb=`<div class="ovstrip">${g.slice(0,4).map(s=>`<img src="${s}" alt="">`).join('')}</div>`;
  else if(g.length) thumb=`<img src="${g[0]}" alt="" style="${ps}">`;
  else thumb=`<div class="ovthumb-emoji">${cat.emoji||'🏷️'}</div>`;
  return `<div class="ovcard" onclick="selectCat('${cat.id}')">
    <div class="ovthumb">${thumb}</div>

          </div>
        </div>

      </div>
    </div>`;
  }).join('');

  const seen=new Set(),allTags=[];

  const sumHtml=allTags.length?`<div class="sumbox">
    <div class="sumhead"><div class="sumtitle">✨ 전체 통합 태그 <span class="sumcnt">${allTags.length}개</span></div>
      <button class="scpbtn" onclick="cpSummary('${cat.id}')">한번에 복사</button></div>
    <div class="sumchips">${allTags.map(t=>`<span class="schap" onclick="cpTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
  </div>`:'';

  const pairHtml=(tab==='artist'&&(!IS_VIEW||pair.length))?`<div class="pairsec">
    <div class="pairhead"><div class="pairtitle">💘 Pair</div>
      ${IS_VIEW?'':`<button class="scpbtn" onclick="openPairModal('${cat.id}')" style="font-size:10px;padding:4px 10px">+ 추가</button>`}
    </div>
    ${!pair.length?'<div class="pairempty">Pair를 추가해보세요</div>':
      pair.map((p,pi)=>`<div class="paircard" data-pi="${pi}">
        ${IS_VIEW?'':`<span class="pair-drag">⠿</span>`}
        <div class="pairav">${p.avatar?`<img src="${p.avatar}" alt="">`:(p.emoji||'💘')}</div>
        <div class="pairbody"><div class="pairname">${esc(p.name)}</div>
          <div class="pairtags">${(p.tags||[]).map((t,i)=>`<span class="chip ${ks[i%6]}" onclick="cpTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
        </div>
        <div class="pairacts">
          ${IS_VIEW?'':`<button class="copybtn" onclick="openPairModal('${cat.id}',${pi})">✏️</button>`}
          <button class="copybtn" onclick="cpPairCat('${cat.id}',${pi})">복사</button>
          ${IS_VIEW?'':`<button class="delbtn" onclick="delPairCat('${cat.id}',${pi})">✕</button>`}
        </div>
      </div>`).join('')}
  </div>`:'';

  const galHtml=`<div class="cgal-section">
    <div class="cgal-label">🖼️ 갤러리</div>
    <div class="gallery">
      ${gallery.map((src,gi)=>{
        const gpos=(cat.galPos&&cat.galPos[gi])||{x:50,y:50,size:100};
        const gsz=gpos.size/100;
        const gpw=gsz>1?Math.round(gsz*100)+'%':'100%';
        const gst=`object-fit:cover;object-position:${gpos.x}% ${gpos.y}%;width:${gpw};height:${gpw};max-width:none;`;
        return `<div class="gimgwrap" data-gi="${gi}" onclick="openLbox('${src.replace(/'/g,"\\'")}')">
          <img src="${src}" alt="" style="${gst}">
          ${IS_VIEW?'':`<button class="gimgdel" onclick="event.stopPropagation();delGalImg('${cat.id}',${gi})">✕</button>
          <button class="gimgpos-btn" onclick="event.stopPropagation();openGalImgPos('${cat.id}',${gi})" title="위치/크기">⤢</button>`}
        </div>`;
      }).join('')}
      ${IS_VIEW?'':`<button class="gadd" onclick="document.getElementById('galinput_${cat.id}').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 4 4"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>추가
      </button>
      <input type="file" id="galinput_${cat.id}" style="display:none" accept="image/*" multiple onchange="onGalleryFile(event,'${cat.id}')">`}
    </div>

  document.getElementById('detail').innerHTML=`
    <button class="back-btn" onclick="goBack()">← 목록으로</button>
    <div class="hero">
      <div class="heroav">${cat.avatar?`<img src="${cat.avatar}" alt="">`:(cat.emoji||'🏷️')}</div>
      <div class="herobody">
        <div class="heroname">${esc(cat.name)}</div>
        ${cat.tag?`<div class="herotag">${esc(cat.tag)}</div>`:''}
        <div class="herobadges"><span class="badge">항목 ${entries.length}개</span></div>
        ${cat.memo?`<div class="memobox">${esc(cat.memo)}</div>`:''}
      </div>
      <div class="herobtns">
        <button class="ibtn" onclick="openEditCat('${cat.id}')">✏️</button>

      </div>

    ${IS_VIEW?'':`<button class="addebtn" onclick="openAddEntry('${cat.id}')">+ 항목 추가</button>`}
    ${sumHtml}${pairHtml}${galHtml}`;

  setTimeout(()=>{initGalleryDrag(id);initEntryDrag(id);initPairDrag(id);},80);

// ── MERGE ──
function toggleEntry(catId,idx,label){
  const key=catId+'_'+idx;
  if(selEntries.has(key))selEntries.delete(key);
  else selEntries.set(key,{catId,idx,label,color:PCOLS[pcolIdx++%PCOLS.length]});
  const card=document.getElementById('entry_'+key);
  if(card){const s=selEntries.has(key);card.classList.toggle('sel',s);card.querySelector('.echk').textContent=s?'✓':'';}
  updateMbar();
}
function updateMbar(){
  document.getElementById('mcnt').textContent=selEntries.size+'개';
  document.getElementById('mpills').innerHTML=[...selEntries.entries()].map(([k,v])=>`<div class="mpill"><div class="mpilldot" style="background:${v.color}"></div>${esc(v.label)}<button class="mpillx" onclick="removeSel('${k}')">×</button></div>`).join('');
  document.getElementById('mbar').classList.toggle('on',selEntries.size>0);
}
function removeSel(key){selEntries.delete(key);const c=document.getElementById('entry_'+key);if(c){c.classList.remove('sel');c.querySelector('.echk').textContent='';}updateMbar();}
function clearSel(){selEntries.forEach((_,k)=>{const c=document.getElementById('entry_'+k);if(c){c.classList.remove('sel');c.querySelector('.echk').textContent='';}});selEntries.clear();updateMbar();}
function mergeCopy(){
  const seen=new Set(),all=[];
  [...selEntries.values()].forEach(({catId,idx})=>{
    const cat=[...(cache.artist||[]),...(cache.style||[])].find(c=>c.id===catId);
    if(cat&&cat.entries&&cat.entries[idx])cat.entries[idx].tags.forEach(t=>{if(!seen.has(t)){seen.add(t);all.push(t);}});
  });
  cpText(all.join(', '),`✓ ${all.length}개 태그 복사됨`);
}

// ── COPY ──
function cpText(text,msg){const done=()=>{if(msg)toast(msg);};if(navigator.clipboard&&location.protocol!=='file:')navigator.clipboard.writeText(text).then(done).catch(()=>fbCp(text,done));else fbCp(text,done);}
function fbCp(text,cb){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');cb();}catch{}document.body.removeChild(ta);}
function cpTag(t){cpText(t,`"${t}" 복사됨`);}
function cpAll(catId,idx){const cat=[...(cache.artist||[]),...(cache.style||[])].find(c=>c.id===catId);if(cat&&cat.entries&&cat.entries[idx])cpText(cat.entries[idx].tags.join(', '),'복사 완료');}
function cpSummary(catId){const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;const seen=new Set(),all=[];(cat.entries||[]).forEach(e=>(e.tags||[]).forEach(t=>{if(!seen.has(t)){seen.add(t);all.push(t);}}));cpText(all.join(', '),`✓ ${all.length}개 복사됨`);}
function cpPairCat(catId,pi){const cat=(cache[tab]||[]).find(c=>c.id===catId);if(!cat)return;const p=(cat.pair||[])[pi];if(!p)return;cpText((p.tags||[]).join(', '),`💘 ${p.name} 복사됨`);}

// ── TOAST/LBOX ──
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);}
function openLbox(src){document.getElementById('lboximg').src=src;document.getElementById('lbox').classList.add('on');}
function closeLbox(){document.getElementById('lbox').classList.remove('on');}

// ── NAV ──
function switchTab(t){tab=t;selId=null;document.querySelectorAll('.htab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));document.getElementById('overview').style.display='block';document.getElementById('detail').style.display='none';renderSidebar();renderOverview();}

function loadStyleShare(){const shared=localStorage.getItem('tv_style_shared')!=='false';updateStyleShareBtn(shared);}
function toggleStyleShare(){const cur=localStorage.getItem('tv_style_shared')!=='false';localStorage.setItem('tv_style_shared',String(!cur));updateStyleShareBtn(!cur);toast(!cur?'베이스프롬 공유 켜짐':'베이스프롬 공유 꺼짐');}

// ── SHARE ──
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return String(h);}
function openShareSettings(){
  const uid=currentUser.uid;
  const newPw=prompt('뷰어 비밀번호\n(빈칸 = 비밀번호 없음)','');if(newPw===null)return;
  localStorage.setItem('tv_pw_'+uid,newPw.trim()===''?'NO_PW':simpleHash(newPw.trim()));
  const newPairKey=prompt('Pair 공개 키',localStorage.getItem('tv_pairkey_'+uid)||'secret');
  if(newPairKey!==null&&newPairKey.trim())localStorage.setItem('tv_pairkey_'+uid,newPairKey.trim());
  const storedHash=localStorage.getItem('tv_pw_'+uid)||'NO_PW';
  const pwParam=storedHash!=='NO_PW'?`&pw=${storedHash}`:'';
  const pairKey=localStorage.getItem('tv_pairkey_'+uid)||'secret';
  const styleShared=localStorage.getItem('tv_style_shared')!=='false';
  const styleParam=styleShared?'':'&style=0';
  const base=location.origin+location.pathname;
  document.getElementById('sharelink1').value=`${base}?view=1&uid=${uid}${pwParam}${styleParam}`;
  document.getElementById('sharelink2').value=`${base}?view=1&uid=${uid}${pwParam}&pair=${pairKey}${styleParam}`;
  ['1','2'].forEach(n=>{document.getElementById('sharecpbtn'+n).textContent='복사';document.getElementById('sharecpbtn'+n).classList.remove('done');});
  document.getElementById('sharepop').classList.add('on');
}
function closeSharePop(){document.getElementById('sharepop').classList.remove('on');}
function cpShareLink(n){const val=document.getElementById('sharelink'+n).value;const btn=document.getElementById('sharecpbtn'+n);cpText(val,'');btn.textContent='✓ 복사됨';btn.classList.add('done');setTimeout(()=>{btn.textContent='복사';btn.classList.remove('done');},2000);}

function openEditCat(id){if(IS_VIEW)return;const cat=(cache[tab]||[]).find(c=>c.id===id);if(!cat)return;editCatId=id;pendingAv=cat.avatar||null;document.getElementById('catmodaltitle').textContent='카테고리 편집';document.getElementById('catname').value=cat.name;document.getElementById('cattag').value=cat.tag||'';document.getElementById('catemoji').value=cat.emoji||'🏷️';document.getElementById('catmemo').value=cat.memo||'';document.getElementById('pavprev').innerHTML=cat.avatar?`<img src="${cat.avatar}" alt="">`:(cat.emoji||'🎨');document.getElementById('catmodal').classList.add('on');}

function saveCat(){
  if(IS_VIEW)return;

function closeEntryModal(){document.getElementById('entrymodal').classList.remove('on');}
function saveEntry(){

  const tags=document.getElementById('entrytags').value.split(/[\n,]+/).map(t=>t.trim()).filter(Boolean);

function addGroup(){const name=prompt('그룹 이름','새 그룹');if(!name)return;const groups=getGroups();groups.push({id:'g'+Date.now(),name});saveGroups(groups);renderOverview();}

function editGroupTitle(gi,btn){
  const groups=getGroups();const cur=groups[gi]?.name||'';
  const inp=document.createElement('input');
  inp.style.cssText='font-size:14px;font-weight:700;background:none;border:none;border-bottom:2px solid var(--sky2);outline:none;font-family:inherit;width:160px;padding:0;color:var(--text)';
  inp.value=cur;btn.replaceWith(inp);inp.focus();inp.select();
  const done=()=>{const val=inp.value.trim()||cur;groups[gi].name=val;saveGroups(groups);const nb=document.createElement('button');nb.className='group-title';nb.textContent=val;nb.setAttribute('ondblclick',`editGroupTitle(${gi},this)`);inp.replaceWith(nb);};
  inp.addEventListener('blur',done);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur();}});
}
function openGroupModal(){
  // 삭제된 그룹 ID 정리
  const groups=getGroups();
  const validIds=new Set(groups.map(g=>g.id));
  let dirty=false;
  (cache[tab]||[]).forEach(c=>{if(c.groupId&&!validIds.has(c.groupId)){delete c.groupId;dirty=true;}});
  if(dirty)saveDB();
  const cats=cache[tab]||[];
  document.getElementById('group-manage-list').innerHTML=cats.map(cat=>{
    const opts=`<option value="">없음</option>`+groups.map(g=>`<option value="${g.id}" ${cat.groupId===g.id?'selected':''}>${esc(g.name)}</option>`).join('');
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)"><div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--sky),var(--pink));display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0">${cat.avatar?`<img src="${cat.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:(cat.emoji||'🏷️')}</div><span style="flex:1;font-size:12px;font-weight:600">${esc(cat.name)}</span><select data-catid="${cat.id}" style="font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 6px;background:var(--bg);font-family:inherit;color:var(--text);outline:none">${opts}</select></div>`;
  }).join('');
  document.getElementById('groupmodal').classList.add('on');
}
function closeGroupModal(){document.getElementById('groupmodal').classList.remove('on');}
function saveGroupManage(){document.querySelectorAll('#group-manage-list select').forEach(sel=>{const cat=(cache[tab]||[]).find(c=>c.id===sel.dataset.catid);if(!cat)return;if(sel.value)cat.groupId=sel.value;else delete cat.groupId;});saveDB();closeGroupModal();renderOverview();}

// ── CARD STYLE ──
const FRAMES=['none','round','square','shadow','border','polaroid'];
function loadCardStyle(){
  const s=localStorage.getItem('tv_cardstyle')||'vertical';
  const f=localStorage.getItem('tv_cardframe')||'none';
  document.body.classList.remove('card-vertical','card-horizontal');
  document.body.classList.add('card-'+s);
  FRAMES.forEach(fr=>document.body.classList.remove('frame-'+fr));
  document.body.classList.add('frame-'+f);
}
function setCardRatio(r){localStorage.setItem('tv_cardstyle',r);loadCardStyle();updateCardStyleUI();saveSettings('cardStyle',r);}
function setCardFrame(f){localStorage.setItem('tv_cardframe',f);loadCardStyle();updateCardStyleUI();saveSettings('cardFrame',f);}
function updateCardStyleUI(){
  const s=localStorage.getItem('tv_cardstyle')||'vertical';
  const f=localStorage.getItem('tv_cardframe')||'none';
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('on'));
  const rv=document.getElementById('ratio-v'),rh=document.getElementById('ratio-h');
  if(rv)rv.classList.toggle('on',s==='vertical');if(rh)rh.classList.toggle('on',s==='horizontal');
  FRAMES.forEach(fr=>{const el=document.getElementById('frame-'+fr);if(el)el.classList.toggle('on',f===fr);});
}
function openCardStyle(){updateCardStyleUI();document.getElementById('cardstylepopup').classList.add('on');}
function closeCardStyle(){document.getElementById('cardstylepopup').classList.remove('on');}

// ── THEME ──
const THEME_PRESETS=[
  {name:'기본',bg:'#f4f0f8',sky:'#e0f0ff',sky2:'#c4e0ff',pink:'#fde8f3',pink2:'#f8cce4',border:'#e4ddf0',cs:'#5a96c4',cp:'#c05888'},
  {name:'라벤더',bg:'#f0eeff',sky:'#e8e0ff',sky2:'#c8b8ff',pink:'#ffe0f8',pink2:'#f0b8e8',border:'#ddd0f0',cs:'#7858c8',cp:'#c058a8'},
  {name:'민트',bg:'#eef8f4',sky:'#d0f0e8',sky2:'#a0e0d0',pink:'#e0f8e8',pink2:'#b8ecd0',border:'#c8e8d8',cs:'#38a880',cp:'#38a860'},
  {name:'피치',bg:'#fff4f0',sky:'#ffe8d8',sky2:'#ffc8a8',pink:'#fff0e8',pink2:'#ffd8c0',border:'#f0d8c8',cs:'#c87040',cp:'#c85040'},
  {name:'다크',bg:'#1e1e2a',sky:'#2a2a40',sky2:'#3a3a60',pink:'#2a1e30',pink2:'#4a2a50',border:'#3a3050',cs:'#8090e0',cp:'#e070a0'},
  {name:'흑백',bg:'#f5f5f5',sky:'#e8e8e8',sky2:'#c8c8c8',pink:'#f0f0f0',pink2:'#d8d8d8',border:'#d0d0d0',cs:'#404040',cp:'#606060'},
];
function applyTheme(t){const r=document.documentElement.style;['bg','sky','sky2','pink','pink2','border','cs','cp'].forEach(k=>{if(t[k])r.setProperty('--'+k,t[k]);});}
function loadTheme(){const saved=JSON.parse(localStorage.getItem('tv_theme')||'null');if(saved)applyTheme(saved);}
function openTheme(){
  document.getElementById('theme-presets').innerHTML=THEME_PRESETS.map((p,i)=>`<div class="theme-preset" style="background:linear-gradient(135deg,${p.sky2},${p.pink2})" onclick="applyPreset(${i})" title="${p.name}"></div>`).join('');
  ['bg','sky2','pink2','cs'].forEach(k=>{const val=getComputedStyle(document.documentElement).getPropertyValue('--'+k).trim();const sw=document.getElementById('tsw-'+k),pk=document.getElementById('tpk-'+k),hx=document.getElementById('thx-'+k);if(sw)sw.style.background=val;if(pk&&val.startsWith('#'))pk.value=val;if(hx)hx.value=val;});
  document.getElementById('themepopup').classList.add('on');
}
function closeTheme(){document.getElementById('themepopup').classList.remove('on');}
function applyPreset(i){applyTheme(THEME_PRESETS[i]);openTheme();}
function onThemePick(key,val){document.getElementById('thx-'+key).value=val;const sw=document.getElementById('tsw-'+key);if(sw)sw.style.background=val;document.documentElement.style.setProperty('--'+key,val);}
function onThemeHex(key,val){if(/^#[0-9a-fA-F]{6}$/.test(val)){const pk=document.getElementById('tpk-'+key),sw=document.getElementById('tsw-'+key);if(pk)pk.value=val;if(sw)sw.style.background=val;document.documentElement.style.setProperty('--'+key,val);}}
function saveTheme(){
  const t={};['bg','sky','sky2','pink','pink2','border','cs','cp'].forEach(k=>t[k]=getComputedStyle(document.documentElement).getPropertyValue('--'+k).trim());
  localStorage.setItem('tv_theme',JSON.stringify(t));saveSettings('theme',t);closeTheme();toast('테마 저장됨!');
}
function resetTheme(){localStorage.removeItem('tv_theme');applyTheme(THEME_PRESETS[0]);saveSettings('theme',THEME_PRESETS[0]);openTheme();}

// ── UTILS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── INIT ──
loadTheme();
loadCardStyle();
loadTabNames();
loadFirebase();
</script>
